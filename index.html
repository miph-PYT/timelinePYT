int-Germain: South Tyrol annexed to Italy against the will of its ~250,000 German- and Ladin-speaking inhabitants. No plebiscite offered."},{id:"h4",year:1923,title:"Italianisation begins",loc:"regional",color:"#D98032",desc:"Mussolini bans German from schools, public life, courts, and official use. German and Ladin place names replaced by Italian. German surnames forcibly Italianised by decree. Teaching children German becomes illegal."},{id:"h5",year:1939,title:"The Options (Optionen)",loc:"regional",color:"#D98032",desc:"Hitler-Mussolini pact forces South Tyroleans to choose: emigrate to the German Reich, or stay and be fully assimilated. ~86% opt to leave. WWII disrupts the transfers; most stay. 'Dableiber' and 'Optanten' communities end up bitterly divided."},{id:"h6",year:1943,title:"Nazi occupation",loc:"regional",color:"#7B4FB0",desc:"After Italy's armistice, German forces occupy South Tyrol as the 'Operationszone Alpenvorland.' German is briefly restored. Jewish South Tyroleans are deported."},{id:"h7",year:1945,title:"Post-war: Italy keeps South Tyrol",loc:"regional",color:"#5F5E5A",desc:"Allied powers confirm South Tyrol within Italy. Autonomy demands restart immediately."},{id:"h8",year:1946,title:"De Gasperi\u2013Gruber Pact",loc:"regional",color:"#1D9E75",desc:"Paris Peace Treaty: Italy formally promises South Tyrol 'local authorities with legislative and executive regional power' \u2014 the legal foundation for all future autonomy demands."},{id:"h9",year:1961,title:"Feuernacht / Night of Fire",loc:"regional",color:"#E15554",desc:"12 June 1961: South Tyrolean Liberation Committee bombs 37 electrical pylons. International pressure forces Italy to negotiate seriously."},{id:"h10",year:1969,title:"Autonomy Package agreed",loc:"regional",color:"#1D9E75",desc:"Italy and Austria agree a 'Package' of 137 measures granting real autonomy to South Tyrol. Implementation takes 23 years."},{id:"h11",year:1972,title:"Second Statute of Autonomy",loc:"regional",color:"#1D9E75",desc:"New statute gives the Province of Bolzano/Bozen genuine legislative and financial autonomy, separate from majority-Italian Trentino. German and Ladin become official languages."},{id:"h12",year:1992,title:"Dispute resolved",loc:"regional",color:"#1D9E75",desc:"Austria and Italy notify the UN: settled. South Tyrol becomes one of Europe's most prosperous and autonomous regions. Bilingualism is protected."}],rg=[{id:"p1",year:769,title:"Stift Innichen founded",color:"#7B4FB0",desc:"Duke Tassilo III of Bavaria founds the collegiate church at Innichen \u2014 one of the oldest Carolingian foundations in the Alps. For over a thousand years it anchors the spiritual and cultural life of the upper Pustertal."},{id:"p2",year:1282,title:"Bruneck founded",color:"#3D9BE0",desc:"Prince-Bishop Bruno von Kirchberg of Brixen establishes Bruneck (Brunico) as a fortified market town on the Rienz river. It becomes the economic and administrative centre of the Pustertal for centuries."},{id:"p3",year:1420,title:"Pustertal fully Habsburg",color:"#3D9BE0",desc:"After the last G\xF6rz count dies, the entire Pustertal passes to the Habsburg County of Tyrol. Five hundred years of Austrian rule begin. Families here live under Habsburg law, language, and culture through to 1919."},{id:"p4",year:1809,title:"Andreas Hofer uprising",color:"#E15554",desc:"The Tyrolean uprising against Napoleonic-Bavarian occupation mobilises men from Innichen and Bruneck. Hofer is captured and executed in 1810 \u2014 he remains the defining folk hero of South Tyrol, whose memory every Pustertal family carries."},{id:"p5",year:1871,title:"Pustertalbahn opens",color:"#1D9E75",desc:"The railway through the Pustertal (Lienz\u2013Innichen\u2013Bruneck\u2013Franzensfeste) opens. It transforms the economy overnight: goods move, people travel, tourism becomes conceivable. Families who had farmed in relative isolation are now connected to the wider world."},{id:"p6",year:1882,title:"Great Rienz flood",color:"#3D9BE0",desc:"Catastrophic flooding of the Rienz / Rienza devastates the Pustertal. Bridges, mills, farmland, and houses swept away in one of the worst flood events in the valley's recorded history. A traumatic collective memory passed down in Pustertal families."},{id:"p7",year:1915,title:"Dolomite Front",color:"#E15554",desc:"Italy enters WWI and the front runs through the Sextner Dolomites, kilometres from Innichen. The Drei Zinnen / Tre Cime di Lavaredo and Monte Paterno become sites of brutal mountain warfare. Innichen serves as an Austrian military base. Virtually every family in the Pustertal loses men."},{id:"p8",year:1923,title:"Place names erased",color:"#D98032",desc:"Mussolini's Italianisation renames every settlement: Innichen \u2192 San Candido, Bruneck \u2192 Brunico, Toblach \u2192 Dobbiaco, Rienz \u2192 Rienza. Family surnames Italianised by decree. For people whose ancestors had used these names for a thousand years, it was an erasure of the landscape itself."},{id:"p9",year:1966,title:"Rienz floods again",color:"#3D9BE0",desc:"Major autumn flooding damages infrastructure throughout the Pustertal, echoing the 1882 disaster. Part of the catastrophic 1966 flooding across Northern Italy. Older people still remembered 1882 when the waters rose again."},{id:"p10",year:1973,title:"Kronplatz ski area opens",color:"#1D9E75",desc:"The ski area above Bruneck opens and rapidly becomes one of South Tyrol's most important winter tourism destinations. The Pustertal economy shifts decisively toward hospitality; the valley's character changes within a generation."},{id:"p11",year:1985,title:"Bruneck city status",color:"#1D9E75",desc:"Bruneck officially receives Stadt / Citt\xE0 designation, recognising its growth as the economic and cultural centre of the Pustertal."},{id:"p12",year:1992,title:"Bilingual names restored",color:"#1D9E75",desc:"Road signs now show both Innichen and San Candido, both Bruneck and Brunico. After 70 years, erased names return to official documents \u2014 though for older families, they had never stopped using them privately."},{id:"p13",year:2012,title:"Severe Pustertal flooding",color:"#3D9BE0",desc:"September 2012: major flash floods and debris flows. Roads cut off, farmland destroyed, infrastructure damaged. The same Rienz valley dynamic that shaped 1882 and 1966, intensified by climate change."}],Iy=[{id:"ggg1",gen:0,seq:0,name:"Josef Hitthaler",birthYear:null,deathYear:null,notes:"Purchased the Kachlerhof in St. Georgen; Greti's great-great-grandfather",role:"Ururopa (Hitthaler)",side:"maternal",parentId1:null,parentId2:null,partnerId:"ggg2"},{id:"ggg2",gen:0,seq:1,name:"(Ahrntal family)",birthYear:null,deathYear:null,notes:"From the Ahrntal; inherited the Zieglerhof; Greti's great-great-grandmother",role:"Ururomi (Hitthaler)",side:"maternal",parentId1:null,parentId2:null,partnerId:"ggg1"},{id:"gg1",gen:1,seq:0,name:"Franz Mitterhofer Sr.",birthYear:null,deathYear:1966,notes:"Phil's paternal great-grandfather; died 1966",role:"Uropa (Mitterhofer)",side:"paternal",parentId1:null,parentId2:null,partnerId:"gg2"},{id:"gg2",gen:1,seq:1,name:"",birthYear:null,deathYear:null,notes:"Ernst Mitterhofer's mother \u2014 name not recorded in family sources",role:"Uromi (Mitterhofer)",side:"paternal",parentId1:null,parentId2:null,partnerId:"gg1"},{id:"gg3",gen:1,seq:2,name:"Richard Arnoldo",birthYear:1886,deathYear:1967,notes:"Born 5 February 1886; died 1967. Marianna's father; Phil's paternal great-grandfather",role:"Uropa (Arnoldo)",side:"paternal",parentId1:null,parentId2:null,partnerId:"gg4"},{id:"gg4",gen:1,seq:3,name:"Maria Trojanek",birthYear:1890,deathYear:1972,notes:"Born 14 September 1890; died 1972. Also spelled Trojaneck; Marianna's mother",role:"Uromi (Arnoldo)",side:"paternal",parentId1:null,parentId2:null,partnerId:"gg3"},{id:"gg5",gen:1,seq:4,name:"Josef Hitthaler",birthYear:null,deathYear:null,notes:"Felix's father; Phil's maternal great-grandfather (son of Josef Sr. & the Ahrntal family
